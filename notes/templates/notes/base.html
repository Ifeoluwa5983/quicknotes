<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}QuickNotes{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0da;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    header a { text-decoration: none; color: inherit; }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }

    .btn {
      display: inline-block;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-ghost { background: transparent; color: #555; border: 1px solid #d1d1cb; }
    .btn-ghost:hover { background: #f0f0eb; }

    main {
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .field {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d1d1cb;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.15s;
      resize: vertical;
    }
    .field:focus { outline: none; border-color: #2563eb; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem; color: #444; }

    .errorlist { list-style: none; color: #dc2626; font-size: 0.85rem; margin-top: 0.3rem; }

    .notes-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .notes-header h2 { font-size: 1.25rem; font-weight: 600; }
    .note-count { font-size: 0.85rem; color: #777; }

    .note-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }

    .note-card {
      background: #fff;
      border: 1px solid #e0e0da;
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }
    .note-card__title { font-weight: 600; margin-bottom: 0.25rem; font-size: 0.95rem; }
    .note-card__preview { color: #555; font-size: 0.875rem; white-space: pre-wrap; word-break: break-word; }
    .note-card__meta { margin-top: 0.6rem; font-size: 0.78rem; color: #999; }

    .empty-state {
      text-align: center;
      padding: 3rem 0;
      color: #888;
    }
    .empty-state p { margin-bottom: 1rem; }

    .form-card {
      background: #fff;
      border: 1px solid #e0e0da;
      border-radius: 8px;
      padding: 1.5rem;
    }
    .form-card h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 1.25rem; }
    .form-actions { display: flex; gap: 0.75rem; align-items: center; }
  </style>
</head>
<body>
  <header>
    <a href="{% url 'notes:list' %}"><h1>&#128221; QuickNotes</h1></a>
    <a href="{% url 'notes:create' %}" class="btn btn-primary">+ New Note</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
